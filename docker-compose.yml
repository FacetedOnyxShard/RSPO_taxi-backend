services:
  postgres:
    image: postgres:18.3
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TAXI_DB_USER: ${DB_USERNAME}
      TAXI_DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase-migrations:
    image: liquibase/liquibase:latest # последняя версия не содержит в себе driver и его надо монтировать
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - D:/univer/3_course/ServPO/TaxiBackend/migrations:/liquibase/changelog
      - ./drivers:/liquibase/drivers
      - ./migrate.sh:/liquibase/migrate.sh
    command: sh /liquibase/migrate.sh

  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s

  worker-service:
    build: ./worker_service
    env_file:
      - .env
    environment:
      SERVER_PORT: 8003
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/worker_service
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      liquibase-migrations:
        condition: service_completed_successfully
      # redis:
      #   condition: service_healthy

  user-service:
    build: ./user_service
    env_file:
      - .env
    environment:
      SERVER_PORT: 8001
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_service
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      worker-service:
        condition: service_started
      # redis:
      #   condition: service_healthy

  trip-service:
    build: ./trip_service
    env_file:
      - .env
    environment:
      SERVER_PORT: 8002
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/trip_service
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # USER_SERVICE_URL: http://user-service:8001
      # WORKER_SERVICE_URL: http://worker-service:8003
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      # redis:
      #   condition: service_healthy

volumes:
  postgres_data: