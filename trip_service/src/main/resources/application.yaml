spring:
  application:
    name: trip_service

  config:
    import: optional:file:../.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/trip_service
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

server:
  port: 8002

user-service:
  url: http://user-service:8001

worker-service:
  url: http://worker-service:8003

jwt:
  secret: ${JWT_SECRET}

taxi:
  tariff: 50