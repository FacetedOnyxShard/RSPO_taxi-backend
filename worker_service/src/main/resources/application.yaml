spring:
  application:
    name: worker_service
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/worker_service
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8003

worker:
  pool:
    size: 4